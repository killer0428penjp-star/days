<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square White Portal</title>
    <style>
        :root {
            --bg-white: #ffffff;
            --bg-sub: #f5f5f5;
            --bg-hover: #fafafa;
            --border-light: #cccccc;
            --border-hover: #111111;
            --text-main: #1a202c;
            --text-sub: #718096;
            --accent: #0070ff;
            --accent-text: #ffffff;
            --main-bg: #f0f4f8;
            --dot-color: #e2e8f0;
        }

        body.dark-theme {
            --bg-white: rgba(30, 30, 47, 0.85);
            --bg-sub: #111111;
            --bg-hover: #2d3748;
            --border-light: #2d3748;
            --border-hover: #00f2ff;
            --text-main: #ffffff;
            --text-sub: #a0aec0;
            --accent: #00f2ff;
            --accent-text: #1e1e2f;
            --main-bg: #1e1e2f;
            --dot-color: #2d3748;
        }

        * {
            border-radius: 0 !important;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--main-bg);
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            font-family: "Inter", "Hiragino Sans", sans-serif;
            overflow-y: scroll;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* トップバー（DARKトグルを削除したのでタブのみ） */
        .top-navbar {
            width: 100%;
            height: 60px;
            background-color: var(--main-bg);
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
            transition: border-color 0.4s ease, background-color 0.4s ease;
        }
        .top-navbar:hover { border-bottom-color: var(--border-hover); }

        .nav-tags {
            display: flex;
            border: 1px solid var(--border-light);
        }
        .tag {
            padding: 8px 25px;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            border-right: 1px solid var(--border-light);
            transition: all 0.2s;
            color: var(--text-sub);
            user-select: none;
            background: var(--bg-white);
        }
        .tag:last-child { border-right: none; }
        .tag:hover { background-color: var(--bg-hover); color: var(--text-main); }
        .tag.active { background-color: var(--accent); color: var(--accent-text); border-color: var(--accent); }

        .main-container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .content-section {
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        .content-section.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Settings行 */
        .setting-row {
            display: grid;
            grid-template-columns: 200px 1fr 100px;
            align-items: center;
            background-color: var(--bg-white);
            border: 1px solid var(--border-light);
            margin-bottom: -1px;
            transition: all 0.2s;
        }
        .setting-row:hover {
            border-color: var(--border-hover);
            z-index: 10;
            background-color: var(--bg-hover);
        }
        .row-label { padding: 15px 25px; font-weight: 700; font-size: 0.85rem; border-right: 1px solid var(--border-light); }
        .row-desc  { padding: 15px 25px; font-size: 0.8rem; color: var(--text-sub); }
        .row-action { padding: 15px; display: flex; justify-content: center; border-left: 1px solid var(--border-light); }

        /* Othersカード */
        .content-card {
            display: grid;
            grid-template-columns: 220px 1fr 2fr;
            background-color: var(--bg-white);
            border: 1px solid var(--border-light);
            margin-bottom: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .content-card:hover {
            border-color: var(--border-hover);
            background-color: var(--bg-hover);
        }
        .item-img {
            background-color: var(--bg-sub);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-sub);
            font-size: 0.7rem;
            letter-spacing: 2px;
            border-right: 1px solid var(--border-light);
        }
        .item-title { padding: 30px; display: flex; align-items: center; font-weight: 700; font-size: 1rem; }
        .item-desc  { padding: 30px; color: var(--text-sub); font-size: 0.9rem; line-height: 1.8; display: flex; align-items: center; }

        /* スイッチ */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-sub);
            transition: .4s;
            border: 1px solid var(--border-light);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: #ffffff;
            transition: .4s;
            border: 1px solid var(--border-light);
        }
        input:checked + .slider { background-color: var(--accent); border-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(26px); border-color: var(--accent); }

        @media (max-width: 850px) {
            .top-navbar { padding: 0 20px; }
            .content-card { grid-template-columns: 1fr; }
            .item-img { aspect-ratio: 16/9; border-right: none; border-bottom: 1px solid var(--border-light); }
            .setting-row { grid-template-columns: 1fr 80px; }
            .row-label { border-right: none; }
            .row-desc { display: none; }
        }
    </style>
</head>
<body>

    <header class="top-navbar">
        <nav class="nav-tags">
            <div class="tag active" data-target="settings">Settings</div>
            <div class="tag" data-target="others">Others</div>
        </nav>
        <!-- 右上のDARKトグルは削除 -->
    </header>

    <main class="main-container">

        <section id="settings" class="content-section active">

            <!-- DARK_MODE：切り替えで親ページ全体のダークモードを制御 -->
            <div class="setting-row">
                <div class="row-label">DARK_MODE</div>
                <div class="row-desc">UI全体を低照度の配色に切り替えます。</div>
                <div class="row-action">
                    <label class="switch">
                        <input type="checkbox" id="darkModeSwitch">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- NOTIFICATIONS：オンで右上切替ボタンを表示、オフで非表示 -->
            <div class="setting-row">
                <div class="row-label">NOTIFICATIONS</div>
                <div class="row-desc">右上のダーク切替ボタンの表示・非表示を切り替えます。</div>
                <div class="row-action">
                    <label class="switch">
                        <input type="checkbox" id="notificationsSwitch" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

        </section>

        <section id="others" class="content-section">
            <div class="content-card">
                <div class="item-img">IMAGE_AREA</div>
                <div class="item-title">PROJECT_ALPHA</div>
                <div class="item-desc">
                    すべての要素から角丸を排除しました。マウスをホバーした瞬間にだけ、繊細な枠線が表示されるミニマルな仕様です。
                </div>
            </div>

            <div class="content-card">
                <div class="item-img">IMAGE_AREA</div>
                <div class="item-title">DESIGN_ASSETS</div>
                <div class="item-desc">
                    「表」のような整列を維持しつつ、余計な装飾を削ぎ落としています。白をベースにすることで、情報の透明性を高めています。
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- タブ切り替え ---
        const tags     = document.querySelectorAll('.tag');
        const sections = document.querySelectorAll('.content-section');

        tags.forEach(tag => {
            tag.addEventListener('click', () => {
                tags.forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                const target = tag.getAttribute('data-target');
                sections.forEach(section => {
                    section.classList.remove('active');
                    if (section.id === target) section.classList.add('active');
                });
            });
        });

        // --- DARK_MODE スイッチ ---
        const darkSwitch = document.getElementById('darkModeSwitch');

        // 内部テーマも同期して更新
        function applyTheme(isDark) {
            if (isDark) {
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
            }
            darkSwitch.checked = isDark;
        }

        darkSwitch.addEventListener('change', () => {
            const isDark = darkSwitch.checked;
            applyTheme(isDark);
            // 親ページへ通知
            window.parent.postMessage({ type: 'setDarkMode', value: isDark }, '*');
        });

        // --- NOTIFICATIONS スイッチ ---
        const notifSwitch = document.getElementById('notificationsSwitch');

        notifSwitch.addEventListener('change', () => {
            // 親ページへ通知（trueで表示、falseで非表示）
            window.parent.postMessage({ type: 'setNotifications', value: notifSwitch.checked }, '*');
        });

        // --- 親ページ（clock.js）からのpostMessageを受け取る ---
        // 親のダークモードが変わったらこちらも同期
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'darkMode') {
                applyTheme(e.data.value);
            }
        });

        // --- 初期状態：親のlocalStorageに合わせる ---
        // iframe内からlocalStorageに直接アクセスできるので読み取り
        try {
            const saved = localStorage.getItem('darkMode') === 'true';
            applyTheme(saved);
        } catch (e) {
            // cross-origin時は無視
        }
    </script>

</body>
</html>
