<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Clock & Weather & Neo Pod</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Montserrat:wght@400;700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/neopod.css">
    <style>
        #main-switch-container {
            position: fixed;
            z-index: 9000;
            transition: top 0.4s cubic-bezier(.4,0,.2,1),
                        right 0.4s cubic-bezier(.4,0,.2,1);
        }

        /* ============================================================
           プロフィール編集モーダル — リデザイン
        ============================================================ */
        #profile-modal .pf-modal-inner {
            background: #ffffff;
            border-radius: 24px;
            padding: 36px 32px 28px;
            width: 90%;
            max-width: 420px;
            max-height: 88vh;
            overflow-y: auto;
            box-shadow: 0 16px 56px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body.dark-mode #profile-modal .pf-modal-inner {
            background: #1e1e2f;
            box-shadow: 0 16px 56px rgba(0,0,0,0.6);
        }

        /* アバターエリア */
        #profile-modal .pf-avatar-wrap {
            position: relative;
            width: 96px;
            height: 96px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        #profile-modal .pf-avatar-wrap img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent, #7c3aed);
            box-shadow: 0 4px 18px rgba(124,58,237,0.25);
            display: block;
            transition: filter 0.2s, transform 0.2s;
        }
        #profile-modal .pf-avatar-wrap:hover img {
            filter: brightness(0.75);
            transform: scale(1.04);
        }
        #profile-modal .pf-avatar-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        #profile-modal .pf-avatar-wrap:hover .pf-avatar-overlay {
            opacity: 1;
        }
        #profile-modal .pf-avatar-overlay span {
            font-size: 11px;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        /* 名前・ID */
        #profile-modal .pf-name {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-main, #1a202c);
            margin-bottom: 2px;
            letter-spacing: 0.2px;
        }
        #profile-modal .pf-id {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 24px;
        }

        /* 区切り線 */
        #profile-modal .pf-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(124,58,237,0.25), transparent);
            margin-bottom: 22px;
        }

        /* フィールドグループ */
        #profile-modal .pf-fields {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 22px;
        }
        #profile-modal .pf-field-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
        }
        #profile-modal .pf-field-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--accent, #7c3aed);
            margin-bottom: 6px;
            padding-left: 2px;
        }
        #profile-modal .pf-field-wrap input[type="date"],
        #profile-modal .pf-field-wrap textarea {
            width: 100%;
            background: #f7f7fb;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            color: #1a202c;
            font-family: inherit;
            font-size: 14px;
            padding: 11px 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            box-sizing: border-box;
        }
        body.dark-mode #profile-modal .pf-field-wrap input[type="date"],
        body.dark-mode #profile-modal .pf-field-wrap textarea {
            background: #2a2a40;
            border-color: #3d3d5c;
            color: #e2e8f0;
        }
        #profile-modal .pf-field-wrap input[type="date"]:focus,
        #profile-modal .pf-field-wrap textarea:focus {
            border-color: var(--accent, #7c3aed);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
            background: #fff;
        }
        body.dark-mode #profile-modal .pf-field-wrap input[type="date"]:focus,
        body.dark-mode #profile-modal .pf-field-wrap textarea:focus {
            background: #2a2a40;
        }
        #profile-modal .pf-field-wrap textarea {
            height: 90px;
            resize: none;
            line-height: 1.6;
        }

        /* ボタン行 */
        #profile-modal .pf-btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        #profile-modal .pf-btn-cancel {
            flex: 1;
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            border-radius: 12px;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s, color 0.18s;
        }
        #profile-modal .pf-btn-cancel:hover {
            background: #e5e7eb;
            color: #374151;
        }
        body.dark-mode #profile-modal .pf-btn-cancel {
            background: #2a2a40;
            color: #a0aec0;
        }
        body.dark-mode #profile-modal .pf-btn-cancel:hover {
            background: #3a3a55;
            color: #e2e8f0;
        }
        #profile-modal .pf-btn-save {
            flex: 2;
            background: linear-gradient(135deg, var(--accent, #7c3aed), #a855f7);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(124,58,237,0.3);
            transition: opacity 0.18s, transform 0.15s;
        }
        #profile-modal .pf-btn-save:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        #profile-modal .pf-btn-save:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- 固定ヘッダー -->
    <header id="neo-fixed-header" style="display:none; position:fixed; top:15px; right:15px; z-index:10000; align-items:center; gap:10px; background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:25px; backdrop-filter:blur(5px);">
        <div id="my-profile-btn-wrapper" style="cursor:pointer; display:flex; align-items:center; gap:8px;">
            <img id="my-profile-btn" src="" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--accent); object-fit:cover; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,0.3);">
            <div id="my-name-display" style="color:white; font-weight:bold; text-shadow:1px 1px 2px #000; font-size:14px; margin-right:5px;"></div>
        </div>
        <div style="display:flex; gap:5px; align-items:center;">
            <button onclick="window.np_logout()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:4px 8px; border-radius:10px; font-size:10px; cursor:pointer;">ログアウト</button>
            <button onclick="window.execDeleteAccount()" style="background:rgba(255,100,100,0.8); color:white; border:none; padding:4px 8px; border-radius:10px; font-size:9px; cursor:pointer;">削除</button>
        </div>
    </header>

    <!-- ダーク/ライト切り替え -->
    <div class="switch-container" id="main-switch-container">
        <label class="switch"><input type="checkbox" id="modeToggle"><span class="slider"></span></label>
    </div>

    <!-- 時計・天気 -->
    <div class="top-space" id="header-bg">
        <div id="date-top" style="text-align:center; font-size:14px; font-weight:bold; margin-bottom:5px; letter-spacing:1px; color:var(--text-main);">
            <span id="current-date">----/--/--</span>
            <span id="current-day">-</span>
        </div>
        <div class="weather-top">
            <span>天気 <span id="weather-text">--</span></span>
            <span>温度 <span id="temp">--</span>℃ <span id="temp-diff" class="diff-badge"></span></span>
            <span>湿度 <span id="humidity">--</span>% <span id="hum-diff" class="diff-badge"></span></span>
        </div>
        <div class="clock-main" id="clock">--:--:<span class="seconds">--</span></div>
    </div>

    <!-- 今日の予定バー -->
    <div id="today-memo-top-header" class="today-bar" style="display:none;">
        <div class="today-bar-content">
            <span class="today-label">TODAY:</span>
            <span class="today-bar-text"></span>
            <button type="button" class="today-more-btn">もっと見る</button>
        </div>
    </div>

    <!-- タブ -->
    <div class="tag-container">
        <span class="tag active" id="news-tag">news</span>
        <span class="tag" id="study-tag">study</span>
        <span class="tag" id="tolk-tag">tolk</span>
        <span class="tag" id="calendar-tag">calendar</span>
        <span class="tag" id="others-tag">others</span>
    </div>

    <!-- news（初期表示） -->
    <div id="news-feed-container" style="display:block;">
        <div class="news-tabs">
            <div id="tab-latest"  class="n-tab active">Latest</div>
            <div id="tab-popular" class="n-tab">Trending</div>
            <div id="tab-likes"   class="n-tab">Bookmark</div>
        </div>
        <div id="feed"><div style="text-align:center; padding:40px; font-weight:800; color:var(--accent);">INITIALIZING...</div></div>
    </div>

    <!-- study -->
    <div id="study-container" style="display:none; width:100%; height:calc(100vh - 220px); margin:0; padding:0;">
        <iframe src="study.html" style="width:100%; height:100vh; border:none;" allowfullscreen></iframe>
    </div>

    <!-- others -->
    <div id="others-container" style="display:none; width:100%; height:calc(100vh - 220px); margin:0; padding:0;">
        <iframe id="others-iframe" src="other.html" style="width:100%; height:600vh; border:none;" allowfullscreen></iframe>
    </div>

    <!-- calendar -->
    <div id="calendar-container" style="display:none;">
        <div class="calendar">
            <div id="today-memo-top" style="margin-bottom:15px; padding:10px; background:rgba(255,105,180,0.1); border-radius:8px; border-left:4px solid #ff69b4; font-size:0.9em; font-weight:bold; color:var(--text-main);">今日の予定: なし</div>
            <div class="cal-header">
                <button id="prev">←</button>
                <div id="cal-title"></div>
                <button id="next">→</button>
            </div>
            <div class="week" id="weekdays">
                <div data-dow="0">日</div><div data-dow="1">月</div><div data-dow="2">火</div>
                <div data-dow="3">水</div><div data-dow="4">木</div><div data-dow="5">金</div><div data-dow="6">土</div>
            </div>
            <div class="days" id="days"></div>
            <div class="memo">
                <h3 id="memo-date" style="margin:0 0 10px 0; font-size:1.1em;">日付を選択</h3>
                <textarea id="memo-text" placeholder="メモを書く" spellcheck="false"></textarea>
                <div id="status-msg"></div>
                <div style="margin-bottom:10px; font-size:0.8em;">
                    <label><input type="checkbox" id="repeat-checkbox"> 繰り返し3か月</label>
                </div>
                <div>
                    <button class="action-btn save-btn"      id="save-btn">保存</button>
                    <button class="action-btn important-btn" id="important-btn">大事な保存</button>
                    <button class="action-btn delete-btn"    id="delete-btn">削除</button>
                    <button class="action-btn delete-all-btn" id="delete-all-btn">全削除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- tolk -->
    <div id="tolk-screen" class="screen" style="display:none;">

        <!-- ログイン画面 -->
        <div id="auth-screen" class="auth-overlay">
            <div class="auth-card">
                <h2 style="margin-bottom:20px;">Neo Pod Pro</h2>
                <div id="acc-history-area" class="hidden">
                    <div id="acc-history-list" style="display:flex; gap:15px; justify-content:center; overflow-x:auto; padding:10px 0;"></div>
                    <hr style="border:0; border-top:1px solid #eee; margin-bottom:15px;">
                </div>
                <div id="auth-err" style="color:var(--danger); font-size:12px; margin-bottom:10px; min-height:15px;"></div>
                <input type="text"     id="auth-id" class="input-field" placeholder="ID">
                <input type="password" id="auth-pw" class="input-field" placeholder="パスワード">
                <div id="signup-extra" class="hidden">
                    <input type="text" id="signup-name" class="input-field" placeholder="表示名">
                </div>
                <button id="login-btn"       class="send-btn">ログイン</button>
                <button id="toggle-signup"   style="background:none; border:none; color:var(--accent); margin-top:10px; cursor:pointer; font-size:13px;">新規登録</button>
                <button id="signup-exec-btn" class="send-btn hidden" style="background:var(--accent);">登録完了</button>
            </div>
        </div>

        <!-- ログイン後 -->
        <div id="main-content" class="hidden" style="display:flex; flex-direction:column; height:100%;">
            <div id="nav-area" class="nav-tabs">
                <div id="tab-rooms"   class="tab active" onclick="window.showNeoScreen('rooms')">トーク</div>
                <div id="tab-friends" class="tab"        onclick="window.showNeoScreen('friends')">友達</div>
            </div>

            <div id="rooms-screen" class="screen">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="font-size:12px; color:#888;">トークルーム</span>
                    <button onclick="window.openRoomModal()" style="background:var(--accent); color:white; border:none; padding:6px 15px; border-radius:15px; font-size:12px; cursor:pointer;">+ 新規作成</button>
                </div>
                <table class="data-table"><tbody id="room-list-body"></tbody></table>
            </div>

            <div id="friends-screen" class="screen hidden"></div>

            <div id="chat-screen" class="screen hidden" style="padding:0; display:flex; flex-direction:column;">
                <div style="padding:10px 15px; border-bottom:1px solid var(--border-soft); display:flex; align-items:center; gap:10px;">
                    <button onclick="window.showNeoScreen('rooms')" style="background:none; border:none; color:var(--accent); font-size:14px; cursor:pointer;">← 戻る</button>
                    <b id="chat-title" style="font-size:15px;">ルーム名</b>
                </div>
                <div id="chat-area" style="flex:1; overflow-y:auto; padding:15px; background:var(--bg);"></div>
                <footer style="padding:10px; background:var(--card-bg,#fff); border-top:1px solid var(--border-soft);">
                    <div class="emoji-tray" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:5px;">
                        <span onclick="window.sendEmoji('👋','wave')"   style="cursor:pointer; font-size:20px;">👋</span>
                        <span onclick="window.sendEmoji('💖','bounce')" style="cursor:pointer; font-size:20px;">💖</span>
                        <span onclick="window.sendEmoji('✨','bounce')" style="cursor:pointer; font-size:20px;">✨</span>
                        <span onclick="window.sendEmoji('🔥','bounce')" style="cursor:pointer; font-size:20px;">🔥</span>
                    </div>
                    <div class="input-box" style="display:flex; gap:8px; margin-top:5px;">
                        <button onclick="document.getElementById('m-file').click()" style="width:40px; height:40px; border-radius:50%; border:none; background:#eee; cursor:pointer;">＋</button>
                        <input type="file" id="m-file" hidden accept="image/*,video/*">
                        <textarea id="m-text" style="flex:1; height:40px; border-radius:20px; border:1px solid var(--border-soft); padding:10px; outline:none; resize:none;" placeholder="メッセージを入力..."></textarea>
                        <button id="send-go" class="send-btn" style="width:60px; height:40px;">送信</button>
                    </div>
                </footer>
            </div>
        </div>

        <!-- ルームモーダル（tolk内） -->
        <div id="room-modal" class="modal-overlay hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:99998; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.6);">
            <div style="background:#fff; border-radius:20px; padding:25px; width:90%; max-width:400px; max-height:85vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.3);">
                <h3 id="modal-title" style="margin-bottom:15px; text-align:center;">ルーム作成</h3>
                <input type="file" id="room-file-input" hidden accept="image/*">
                <div onclick="document.getElementById('room-file-input').click()" style="width:80px; height:80px; margin:0 auto 15px; border:2px dashed #ccc; border-radius:20px; overflow:hidden; cursor:pointer;">
                    <img id="room-preview" src="https://placehold.jp/150x150.png?text=IMG" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <input type="text" id="room-name-input" class="input-field" placeholder="名前を入力">
                <div style="text-align:left; margin-bottom:10px;">
                    <label style="font-size:11px; color:var(--accent); font-weight:bold;">メンバーを選択</label>
                    <div id="room-invite-list" style="max-height:120px; overflow-y:auto; border:1px solid #eee; border-radius:10px; padding:5px; margin-top:5px;"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button onclick="window.closeModal('room-modal')" style="flex:1; background:#eee; border:none; padding:10px; border-radius:15px; cursor:pointer;">戻る</button>
                    <button id="room-save-btn" style="flex:2; background:var(--accent); color:white; border:none; padding:10px; border-radius:15px; font-weight:bold; cursor:pointer;">保存</button>
                </div>
            </div>
        </div>

    </div><!-- /#tolk-screen -->

    <!-- ============================================================
         プロフィール編集モーダル — リデザイン版
    ============================================================ -->
    <div id="profile-modal" class="modal-overlay hidden"
         style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:99999;
                display:none; align-items:center; justify-content:center;
                background:rgba(0,0,0,0.55); backdrop-filter:blur(4px);">

        <div class="pf-modal-inner">

            <!-- アバター -->
            <div class="pf-avatar-wrap" onclick="document.getElementById('profile-file-input').click()">
                <img id="profile-edit-preview" src="" alt="avatar">
                <div class="pf-avatar-overlay"><span>📷 変更</span></div>
            </div>
            <input type="file" id="profile-file-input" hidden accept="image/*">

            <!-- 名前・ID -->
            <div class="pf-name" id="edit-profile-name"></div>
            <div class="pf-id"   id="edit-profile-id"></div>

            <div class="pf-divider"></div>

            <!-- フィールド -->
            <div class="pf-fields">
                <div class="pf-field-wrap">
                    <label class="pf-field-label">🎂 誕生日</label>
                    <input type="date" id="edit-birthday">
                </div>
                <div class="pf-field-wrap">
                    <label class="pf-field-label">✏️ 自己紹介</label>
                    <textarea id="edit-bio" placeholder="自己紹介・説明欄"></textarea>
                </div>
            </div>

            <!-- ボタン -->
            <div class="pf-btn-row">
                <button class="pf-btn-cancel" onclick="window.closeModal('profile-modal')">キャンセル</button>
                <button class="pf-btn-save"   id="profile-save-btn">保存する</button>
            </div>

        </div>
    </div>

    <!-- 他ユーザープロフィール表示 -->
    <div id="view-profile-modal" class="modal-overlay hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:99999; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.6);">
        <div style="background:#ffffff; border-radius:20px; padding:25px; width:90%; max-width:400px; max-height:85vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,0.4);">
            <div style="width:100px; height:100px; margin:0 auto 15px; border-radius:50%; overflow:hidden; border:3px solid var(--accent); background:#f0f0f0;">
                <img id="view-profile-icon" src="" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div style="display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:15px;">
                <span id="view-profile-name" style="font-weight:bold; font-size:15px; color:#333;"></span>
                <span id="view-profile-id"   style="font-size:12px; color:#888; border-left:1px solid #ddd; padding-left:8px;"></span>
            </div>
            <div style="text-align:left; background:#f5f5f5; padding:15px; border-radius:15px; margin-bottom:15px;">
                <div style="font-size:11px; color:var(--accent); font-weight:bold; margin-bottom:4px;">誕生日</div>
                <div id="view-profile-birthday" style="margin-bottom:12px; font-size:14px; color:#333;">-</div>
                <div style="font-size:11px; color:var(--accent); font-weight:bold; margin-bottom:4px;">自己紹介</div>
                <div id="view-profile-bio" style="font-size:14px; white-space:pre-wrap; color:#333;">-</div>
            </div>
            <button onclick="window.closeModal('view-profile-modal')" style="width:100%; background:#eee; border:none; padding:10px; border-radius:15px; cursor:pointer; font-size:14px; color:#555;">閉じる</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>

    <script>
        // ============================================================
        //  ダークモード切替ボタン位置を localStorage から復元
        // ============================================================
        (function() {
            try {
                const s = localStorage.getItem('toggleBtnPos');
                if (!s) return;
                const pos = JSON.parse(s);
                const el  = document.getElementById('main-switch-container');
                if (el) applyTogglePos(el, pos);
            } catch(e) {}
        })();

        function applyTogglePos(el, pos) {
            el.style.top    = (pos.top   != null ? pos.top   : 15) + 'px';
            el.style.right  = (pos.right != null ? pos.right : 15) + 'px';
            el.style.left   = '';
            el.style.bottom = '';
        }

        // ============================================================
        //  others iframe へプロフィールデータを送るヘルパー
        // ============================================================
        function sendProfileToOthers(meObj) {
            if (!meObj) return;
            const iframe = document.getElementById('others-iframe');
            if (!iframe || !iframe.contentWindow) return;
            iframe.contentWindow.postMessage({
                type: 'profileData',
                value: {
                    id:       meObj.id       || '',
                    name:     meObj.name     || '',
                    icon:     (meObj.icon && meObj.icon.val) ? meObj.icon.val : '',
                    birthday: meObj.birthday || '',
                    bio:      meObj.bio      || ''
                }
            }, '*');
        }

        window.notifyLoginToOthers = function(meObj) {
            sendProfileToOthers(meObj);
            try {
                localStorage.setItem('np_profile_cache', JSON.stringify({
                    id:       meObj.id,
                    name:     meObj.name,
                    icon:     (meObj.icon && meObj.icon.val) ? meObj.icon.val : '',
                    birthday: meObj.birthday || '',
                    bio:      meObj.bio      || ''
                }));
            } catch(e) {}
        };

        // ============================================================
        //  タブ切り替え
        // ============================================================
        const ALL_CONTAINERS = [
            'news-feed-container',
            'study-container',
            'calendar-container',
            'tolk-screen',
            'others-container'
        ];

        document.addEventListener('DOMContentLoaded', function () {

            try {
                const s = localStorage.getItem('toggleBtnPos');
                if (s) {
                    const el = document.getElementById('main-switch-container');
                    if (el) applyTogglePos(el, JSON.parse(s));
                }
            } catch(e) {}

            // others タブ
            const othersTag = document.getElementById('others-tag');
            if (othersTag) {
                othersTag.addEventListener('click', function () {
                    ALL_CONTAINERS.forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.style.display = 'none';
                    });
                    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                    const othersContainer = document.getElementById('others-container');
                    if (othersContainer) othersContainer.style.display = 'block';
                    othersTag.classList.add('active');
                });
            }

            // others 以外のタブ
            ['news-tag', 'study-tag', 'tolk-tag', 'calendar-tag'].forEach(tagId => {
                const tag = document.getElementById(tagId);
                if (tag) {
                    tag.addEventListener('click', function () {
                        const oc = document.getElementById('others-container');
                        if (oc) oc.style.display = 'none';
                    });
                }
            });

            // others iframe が読み込まれたらプロフィールを送る
            const othersIframe = document.getElementById('others-iframe');
            if (othersIframe) {
                othersIframe.addEventListener('load', function() {
                    try {
                        const cached = localStorage.getItem('np_profile_cache');
                        if (cached) {
                            othersIframe.contentWindow.postMessage({
                                type: 'profileData',
                                value: JSON.parse(cached)
                            }, '*');
                        }
                    } catch(e) {}
                });
            }

            // ============================================================
            //  postMessage 受信（other.html から）
            // ============================================================
            window.addEventListener('message', function (e) {
                if (!e.data || !e.data.type) return;

                // DARK_MODE
                if (e.data.type === 'setDarkMode') {
                    const isDark = e.data.value;
                    document.body.classList.toggle('dark-mode', isDark);
                    localStorage.setItem('darkMode', isDark);
                    const toggle = document.getElementById('modeToggle');
                    if (toggle) toggle.checked = isDark;
                    const studyFrame = document.querySelector('#study-container iframe');
                    if (studyFrame && studyFrame.contentWindow) {
                        studyFrame.contentWindow.postMessage({ type: 'darkMode', value: isDark }, '*');
                    }
                }

                // NOTIFICATIONS
                if (e.data.type === 'setNotifications') {
                    const sc = document.getElementById('main-switch-container');
                    if (sc) sc.style.display = e.data.value ? '' : 'none';
                }

                // WIDGET_POS
                if (e.data.type === 'setTogglePos') {
                    const pos = e.data.value;
                    const el  = document.getElementById('main-switch-container');
                    if (el) {
                        localStorage.setItem('toggleBtnPos', JSON.stringify(pos));
                        applyTogglePos(el, pos);
                    }
                }

                // PROFILE_PANEL → 右上固定ヘッダーの表示・非表示
                if (e.data.type === 'setProfilePanel') {
                    const header = document.getElementById('neo-fixed-header');
                    if (header) {
                        header.style.display = e.data.value ? 'flex' : 'none';
                    }
                }

                // PROFILE_EDIT → プロフィール編集モーダルを開く
                if (e.data.type === 'openProfileModal') {
                    const btn = document.getElementById('my-profile-btn-wrapper');
                    if (btn) btn.click();
                }

                // updateProfile → Firebase保存 ＋ 固定ヘッダー即時反映
                if (e.data.type === 'updateProfile') {
                    const { icon, birthday, bio } = e.data.value;
                    // Firebase保存（neopod.js 側の関数を呼ぶ）
                    if (typeof window._npUpdateProfile === 'function') {
                        window._npUpdateProfile({ icon, birthday, bio });
                    } else {
                        // フォールバック：localStorageだけ更新 ＋ ヘッダー反映
                        try {
                            const cached = JSON.parse(localStorage.getItem('np_profile_cache') || '{}');
                            cached.icon     = icon;
                            cached.birthday = birthday;
                            cached.bio      = bio;
                            localStorage.setItem('np_profile_cache', JSON.stringify(cached));
                        } catch(err) {}
                    }
                    // 固定ヘッダーのアイコンを即時更新
                    const myBtn = document.getElementById('my-profile-btn');
                    if (myBtn && icon) myBtn.src = icon;
                }
            });
        });
    </script>

</body>
</html>
