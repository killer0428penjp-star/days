<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT_ALPHA — FULLSCREEN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

        #main-iframe {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ── フローティングBACKボタン（右上固定） ── */
        #float-back {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 9999;

            font-family: "Inter", "Hiragino Sans", sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: #ffffff;

            background: rgba(0, 0, 0, 0.68);
            border: 1px solid rgba(255, 255, 255, 0.22);
            padding: 11px 28px;
            cursor: pointer;

            /* 大きめのソフトシャドウ */
            box-shadow:
                0 4px 28px rgba(0, 0, 0, 0.75),
                0 2px 8px  rgba(0, 0, 0, 0.55),
                0 0  0 1px rgba(255, 255, 255, 0.05);

            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            transition: background 0.18s, box-shadow 0.18s, border-color 0.18s;
            user-select: none;
        }
        #float-back:hover {
            background: rgba(20, 20, 20, 0.88);
            border-color: rgba(255, 255, 255, 0.48);
            box-shadow:
                0 6px 40px rgba(0, 0, 0, 0.9),
                0 2px 14px rgba(0, 0, 0, 0.65),
                0 0  0 1px rgba(255, 255, 255, 0.14);
        }
        #float-back:active {
            transform: translateY(1px);
            box-shadow: 0 2px 14px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

<iframe id="main-iframe" src="" title="PROJECT_ALPHA"></iframe>
<button id="float-back">✕ &nbsp;BACK</button>

<script>
    // sessionStorage から表示URLを取得（index.html が設定）
    const src = sessionStorage.getItem('bigSrc') || 'code.html';
    document.getElementById('main-iframe').src = src;

    // BACKボタン → ブラウザ履歴を1つ戻す（index.htmlへ）
    document.getElementById('float-back').addEventListener('click', () => {
        history.back();
    });
</script>

</body>
</html>
